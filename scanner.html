<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scanning...</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh; display: flex; justify-content: center; align-items: center;
            background: radial-gradient(circle at top left, #ffb703, #fb8500, #1d3557); 
            color: white; font-family: 'Poppins', sans-serif; overflow: hidden; transition: background 0.5s ease;
        }
        
        #emojis-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 5; pointer-events: none; }
        .emoji { position: absolute; font-size: 2rem; animation: float 6s linear infinite; }
        .emoji:nth-child(1) { left: 10%; animation-delay: 0s; }
        .emoji:nth-child(2) { left: 80%; animation-delay: 1.5s; }
        .emoji:nth-child(3) { left: 50%; animation-delay: 3s; }
        .emoji:nth-child(4) { left: 25%; animation-delay: 4.5s; }
        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            50% { opacity: 0; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        .card {
            width: 90%; max-width: 550px; padding: 45px 35px; margin: 0 auto; text-align: center;
            border-radius: 35px; background: rgba(255, 255, 255, 0.12); backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.15); box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35); position: relative; z-index: 10;
        }
        .tag {
            display: inline-block;
            background: white; 
            color: #fb8500; 
            font-weight: 700;
            padding: 8px 18px; border-radius: 999px; font-size: 0.9rem; margin-bottom: 25px; }
        .card h1 { font-size: 2.2rem; margin-bottom: 30px; }
        .counter { font-size: 8rem; font-weight: 800; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 40px rgba(255, 183, 3, 0.7); transition: 0.2s; }
        .years { font-size: 2rem; font-weight: 600; margin-top: -15px; }
        .message { margin-top: 35px; opacity: 0; transform: translateY(20px) scale(0.9); transition: 0.6s ease; }
        .show { opacity: 1; transform: translateY(0) scale(1); }
        .main-text {
            font-size: 1.7rem; font-weight: 800; display: inline-block; padding: 10px 22px; border-radius: 18px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 224, 102, 0.28)); border: 2px solid rgba(255, 255, 255, 0.2);
        }

        /* LOCKED PERFECT SQUARE SIZE FOR THE MODAL */
        .modal-card {
            display: none; background: white; padding: 30px 20px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; z-index: 20;
            
            /* THESE TWO LINES MAKE IT A PERFECT SQUARE */
    
    /* Make sure height is set to auto so it wraps around the image */
    height: auto !important; 
    min-height: 340px; 
    /* ...keep your other modal-card settings... */
 
            }
            
            margin: 0 auto;
            transform: translateY(-200%); animation: dropIn 0.8s forwards cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes dropIn { to { transform: translateY(0); } }
        
        .modal-card h2 { color: #333; margin-bottom: 15px; font-size: 2.5rem; }
        
        /* Fixed Button Area */
        .buttons { position: relative; width: 100%; height: 80px; margin: 0 auto; }
        
        .modal-card button { 
            position: absolute; width: 110px; height: 45px; 
            border: none; border-radius: 8px; font-size: 16px; 
            cursor: pointer; font-weight: bold; color: white; 
        }
        
        /* Locked positions side-by-side */
        #btn-yes { left: 20px; top: 10px; background-color: #2ecc71; transition: 0.2s; }
        #btn-yes:hover { background-color: #27ae60; transform: scale(1.05); }
        
        #btn-no { right: 20px; top: 10px; background-color: #e74c3c; transition: left 0.08s ease-out, top 0.08s ease-out, right 0.08s ease-out !important; }

        /* Locked GIF Area */
        .chelav-gif {
    width: 100%;
    max-width: 200px;
    height: 120px; /* Limits how tall the GIF can get */
    object-fit: contain; /* Forces the whole cat to fit inside without cropping! */
    border-radius: 8px;
    margin-top: 10px; 
}

    </style>
</head>
<body>

    <div id="emojis-container">
        <div class="emoji">🪄</div><div class="emoji">🪄</div><div class="emoji">🪄</div><div class="emoji">🪄</div>
    </div>

    <div class="container">
        <div class="card" id="scanner-card">
            <div class="tag">AI Birthday Scanner</div>
            <h1>What age are you turning this year? 🤔</h1>
            <div class="counter" id="counter">0</div>
            <div class="years">Years Old</div>
            <div class="message" id="message">
                <div class="main-text">🎉 Shashtipoorthi Ashamsakal Nenbo 👴</div>
            </div>
        </div>

        <div class="modal-card" id="bill-container">
            <h2><b>Chelav</b></h2>
            <div class="buttons">
                <button id="btn-yes">Tharum</button>
                <button id="btn-no">Tharoola</button>
            </div>
            <img src="gimme.gif" alt="Chelav GIF" class="chelav-gif">
        </div>
    </div>

    <script>
        const scannerCard = document.getElementById('scanner-card');
        const emojisContainer = document.getElementById('emojis-container');
        const billContainer = document.getElementById('bill-container');
        const counter = document.getElementById("counter");
        const message = document.getElementById("message");
        const btnNo = document.getElementById('btn-no');
        const btnYes = document.getElementById('btn-yes');
        const btnContainer = document.querySelector('.buttons');
        let count = 0;
        const target = 60;

        // Start scanning automatically on load
        window.onload = () => {
            setTimeout(updateCounter, 800);
        };

        function updateCounter() {
            if (count < target) {
                count++;
                counter.innerText = count;
                counter.style.transform = "scale(1.15) rotate(2deg)";
                setTimeout(() => { counter.style.transform = "scale(1) rotate(0deg)"; }, 100);
                setTimeout(updateCounter, 35);
            } else {
                message.classList.add("show");
                setTimeout(() => {
                    scannerCard.style.display = 'none';
                    emojisContainer.style.display = 'none';
                    document.body.style.background = "#f4f7f6"; 
                    billContainer.style.display = 'block';
                }, 4000);
            }
        }

        function dodgeButton() {
            btnNo.style.transform = "none";
            btnNo.style.right = "auto"; // Remove the right align so left align takes over
            
            const maxX = btnContainer.clientWidth - btnNo.offsetWidth;
            const maxY = btnContainer.clientHeight - btnNo.offsetHeight;
            btnNo.style.left = Math.floor(Math.random() * maxX) + "px";
            btnNo.style.top = Math.floor(Math.random() * maxY) + "px";
        }

        btnNo.addEventListener('mouseenter', dodgeButton);
        btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); dodgeButton(); });

        // REDIRECT TO FINAL PAGE
        btnYes.addEventListener('click', () => {
            window.location.href = 'good.html';
        });
    </script>
</body>
</html>
