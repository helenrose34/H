<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Restored your original original premium background gradient */
            background: radial-gradient(circle at top left, #ffb703, #fb8500, #1d3557);
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        /* Container to hold both the card and the sticker safely together */
        .wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 340px;
            padding: 20px;
        }

        .modal-card {
            background: white;
            padding: 40px 20px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
            width: 100%;
            /* Fixed square shape rules to match your previous screen */
            height: 180px;
            display: flex;
            justify-content: center;
            align-items: center;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.8);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        h1 {
            color: #2ecc71;
            font-size: 2.2rem;
            font-weight: 900;
            margin: 0;
            line-height: 1.2;
        }

        /* Fixed Sticker layout: It now sits naturally BELOW the box */
        .sticker {
            display: block;
            width: 140px;
            height: auto;
            margin-top: 30px; /* Clean spacing below the white box */
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="modal-card">
            <h1>Killadi achumwon</h1>
        </div>

        <img src="sticker4.png" alt="Sticker" class="sticker">
    </div>

</body>
</html>
