<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yay! 🎉</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            height: 100vh;
            display: flex; justify-content: center; align-items: center;
            background-color: #f4f7f6; /* Clean background matching the bill */
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }
        
        /* Container for both the card and the sticker */
        .wrapper {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* The sticker positioned perfectly above the card */
        .sticker {
            width: 150px; /* Adjust size as needed */
            height: auto;
            position: absolute;
            top: -110px; /* Adjust this value to move the sticker up or down */
            z-index: 2;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .modal-card {
            background: white; padding: 50px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center;
            position: relative;
            z-index: 1;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        h1 { color: #2ecc71; font-size: 3.5rem; margin: 0; }
    </style>
</head>
<body>

    <div class="wrapper">
        <img src="sticker4.png" alt="Sticker" class="sticker">
        
        <div class="modal-card">
            <h1>Killaadi Achumwon </h1>
        </div>
    </div>

</body>
</html>
