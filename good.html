<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Back to your original premium background gradient */
            background: radial-gradient(circle at top left, #ffb703, #fb8500, #1d3557);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
            width: 100%;
            padding: 20px;
        }

        .thanks-text {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        .thanks-sticker {
            display: block;
            width: 100%;
            max-width: 180px;
            height: auto;
            margin: 30px auto 0 auto; /* Keeps it neatly spaced below the text */
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.4));
            animation: celebrate 2s ease-in-out infinite alternate;
        }

        @keyframes celebrate {
            0% {
                transform: scale(1) rotate(-3deg);
            }
            100% {
                transform: scale(1.08) rotate(3deg);
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="thanks-text">Killadi achumwon</h1>
        <img src="sticker4.png" alt="Celebration Sticker" class="thanks-sticker">
    </div>

</body>
</html>
