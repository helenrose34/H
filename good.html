<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You!</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top left, #2ecc71, #27ae60, #1d3557);
            color: white;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
        }

        .thank-you-card {
            width: 90%;
            max-width: 450px;
            padding: 40px 30px;
            margin: 0 auto;
            text-align: center;
            border-radius: 25px;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
        }

        .thanks-text {
            font-size: 2.8rem;
            font-weight: 800;
            letter-spacing: 1px;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .thanks-sticker {
            display: block;
            width: 100%;
            max-width: 150px;
            height: auto;
            margin: 20px auto 0 auto;
            object-fit: contain;
            filter: drop-shadow(0 10px 15px rgba(0, 0, 0, 0.3));
            animation: celebrate 2s ease-in-out infinite alternate;
        }

        @keyframes celebrate {
            0% {
                transform: scale(1) rotate(-3deg);
            }
            100% {
                transform: scale(1.08) rotate(3deg);
            }
        }
    </style>
</head>
<body>

    <div class="thank-you-card">
        <h1 class="thanks-text">Nanniyunde!</h1>
        <img src="sticker4.png" alt="Celebration Sticker" class="thanks-sticker">
    </div>

</body>
</html>
